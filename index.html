    <button class="btn-felicitar" onclick="celebrar()">¡Felicidades a Mami! 🎉</button>

<div id="miVisor" class="viewer">
    <span class="close-btn" onclick="cerrarVisor()">×</span>
    <span class="nav-btn prev" onclick="cambiarFoto(-1)">❮</span>
    <img id="fotoGrande" class="viewer-img">
    <span class="nav-btn next" onclick="cambiarFoto(1)">❯</span>
</div>

<div class="musica-invisible">
    <iframe id="reproductor" width="1" height="1" src="https://www.youtube.com/embed/ixZO0j_LCj4?enablejsapi=1" frameborder="0"></iframe>
</div>

<script>
    let indiceActual = 0;
    const listaFotos = document.querySelectorAll('.gallery img');
    const visor = document.getElementById('miVisor');
    const fotoGrande = document.getElementById('fotoGrande');

    listaFotos.forEach((img, index) => {
        img.onclick = () => {
            indiceActual = index;
            abrirVisor();
        };
    });

    function abrirVisor() {
        visor.style.display = "flex";
        fotoGrande.src = listaFotos[indiceActual].src;
        document.body.style.overflow = "hidden";
    }

    function cerrarVisor() {
        visor.style.display = "none";
        document.body.style.overflow = "auto";
    }

    function cambiarFoto(dir) {
        indiceActual = (indiceActual + dir + listaFotos.length) % listaFotos.length;
        fotoGrande.src = listaFotos[indiceActual].src;
    }

    visor.onclick = (e) => { if(e.target == visor) cerrarVisor(); };

    window.addEventListener('click', () => {
        const iframe = document.getElementById('reproductor');
        if (!iframe.src.includes('autoplay=1')) iframe.src += "&autoplay=1";
    }, { once: true });

    function celebrar() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        setTimeout(() => { alert('¡Te quiero mucho Mami! 🎉🎂🌹'); }, 500);
    }
</script>
